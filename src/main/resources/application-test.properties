# Perfil de testes — MongoDB embarcado (Flapdoodle) e Redis mockado
# O Flapdoodle sobe um MongoDB em memória automaticamente
# O Redis é mockado via @MockBean nos testes

# Força o MongoDB embarcado
spring.data.mongodb.database=notificacoesdb-test

# Desabilita Redis auto-configuration nos testes
spring.data.redis.host=localhost
spring.data.redis.port=6370

spring.cache.type=none

notificacoes.rate-limit.max-por-minuto=10
