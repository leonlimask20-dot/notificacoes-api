server.port=8086
spring.application.name=notificacoes-api

# ── MongoDB ────────────────────────────────────────────────────────────────────
# MongoDB armazena dados como documentos JSON (BSON) em vez de tabelas.
# Ideal para notificações porque cada tipo pode ter estrutura diferente.
spring.data.mongodb.host=${MONGO_HOST:localhost}
spring.data.mongodb.port=${MONGO_PORT:27017}
spring.data.mongodb.database=${MONGO_DB:notificacoesdb}
spring.data.mongodb.username=${MONGO_USER:}
spring.data.mongodb.password=${MONGO_PASS:}

# ── Redis ──────────────────────────────────────────────────────────────────────
# Redis é um banco em memória extremamente rápido.
# Usado aqui para: cache de preferências e rate limiting por usuário.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASS:}

# ── Cache ──────────────────────────────────────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ── Swagger ────────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ── Rate Limiting ──────────────────────────────────────────────────────────────
# Máximo de notificações que um usuário pode enviar por minuto
notificacoes.rate-limit.max-por-minuto=10
